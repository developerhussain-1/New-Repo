<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goku Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#00111f,#062d52,#ff7b00);
}

.calculator{
    width:370px;
    border-radius:20px;
    overflow:hidden;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    box-shadow:0 20px 40px rgba(0,0,0,.45);
}

.header{
    height:170px;
    background:url("https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200") center/cover;
    position:relative;
}

.header::after{
    content:"⚡ GOKU CALCULATOR ⚡";
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    text-align:center;
    padding:12px;
    color:white;
    font-size:22px;
    font-weight:bold;
    background:rgba(0,0,0,.45);
}

.display{
    width:100%;
    height:80px;
    border:none;
    outline:none;
    background:#111;
    color:#fff;
    text-align:right;
    padding:20px;
    font-size:32px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
}

button{
    height:70px;
    border:none;
    font-size:22px;
    cursor:pointer;
    color:white;
    background:#1f2937;
    transition:.2s;
}

button:hover{
    transform:scale(.97);
    filter:brightness(1.15);
}

.operator{
    background:#ff7b00;
}

.equal{
    background:#ff9800;
}

.clear{
    background:#d32f2f;
}

.del{
    background:#1976d2;
}

.zero{
    grid-column:span 2;
}
</style>
</head>

<body>

<div class="calculator">

<div class="header"></div>

<input id="display" class="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">AC</button>
<button class="del" onclick="del()">DEL</button>
<button class="operator" onclick="press('%')">%</button>
<button class="operator" onclick="press('/')">÷</button>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button class="operator" onclick="press('*')">×</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button class="operator" onclick="press('-')">−</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button class="operator" onclick="press('+')">+</button>

<button class="zero" onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>
const display=document.getElementById("display");

function press(value){
    display.value+=value;
}

function clearDisplay(){
    display.value="";
}

function del(){
    display.value=display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value=eval(display.value);
    }catch{
        display.value="Error";
    }
}

document.addEventListener("keydown",(e)=>{

    if("0123456789+-*/.%()".includes(e.key)){
        display.value+=e.key;
    }

    if(e.key==="Enter"){
        e.preventDefault();
        calculate();
    }

    if(e.key==="Backspace"){
        del();
    }

    if(e.key==="Escape"){
        clearDisplay();
    }
});
</script>

</body>
</html>
